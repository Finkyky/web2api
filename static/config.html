<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>账号池配置</title>
    <style>
      :root {
        --bg: #0f0f12;
        --surface: #18181c;
        --border: #2a2a30;
        --text: #e4e4e7;
        --text-muted: #71717a;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #ef4444;
        --danger-hover: #dc2626;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 24px;
        line-height: 1.5;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 24px;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .btn {
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent-hover);
      }
      .btn-ghost {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        background: var(--border);
      }
      .btn-danger {
        background: var(--danger);
        color: #fff;
      }
      .btn-danger:hover {
        background: var(--danger-hover);
      }
      .unfreeze {
        display: block;
        padding: 8px 12px;
        font-size: 14px;
        color: var(--text-muted);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        min-height: 38px;
      }
      .msg {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        padding: 12px 14px;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        max-width: 360px;
        display: none;
      }
      .msg.success {
        background: #14532d;
        color: #bbf7d0;
      }
      .msg.error {
        background: #7f1d1d;
        color: #fecaca;
      }
      .group {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .group h2 {
        font-size: 1rem;
        margin: 0 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .group h2 .label {
        color: var(--text-muted);
        font-weight: 600;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
        margin-bottom: 12px;
      }
      .row.full {
        grid-template-columns: 1fr;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
      }
      textarea {
        resize: vertical;
        min-height: 56px;
      }
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      .accounts {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
      .accounts h3 {
        font-size: 14px;
        margin: 0 0 12px;
        color: var(--text-muted);
      }
      .account {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-end;
      }
      .account .fields {
        flex: 1;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        min-width: 200px;
      }
      .account .fields .f {
        min-width: 120px;
      }
      .account .f label {
        margin-bottom: 2px;
      }
      .account .f input {
        padding: 6px 10px;
        font-size: 13px;
      }
      .account .actions {
        flex-shrink: 0;
      }
      .search-row {
        margin-bottom: 16px;
      }
      .search-row input {
        max-width: 320px;
      }
      .stats {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 16px;
      }
      .group-header {
        cursor: pointer;
        user-select: none;
      }
      .group-header:hover {
        color: var(--accent);
      }
      .group-header .chevron {
        display: inline-block;
        margin-right: 8px;
        transition: transform 0.2s;
      }
      .group-header.collapsed .chevron {
        transform: rotate(-90deg);
      }
      .group.collapsed .group-body {
        display: none;
      }
      .group.collapsed .accounts {
        display: none;
      }
      .pagination {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .pagination .info {
        font-size: 13px;
        color: var(--text-muted);
      }
      .pagination select {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>账号池配置</h1>
    <div id="msg"></div>
    <div class="toolbar">
      <button type="button" class="btn btn-primary" id="addGroup">添加代理组</button>
      <button type="button" class="btn btn-ghost" id="load">重新加载</button>
      <button type="button" class="btn btn-primary" id="save">保存配置</button>
    </div>
    <div class="search-row">
      <label>搜索（代理 host/user 或账号 name）</label>
      <input type="text" id="search" placeholder="输入关键词筛选代理组或账号..." />
    </div>
    <div class="stats" id="stats"></div>
    <div id="list"></div>

    <script>
      const API = '/api/config'
      const POOL_STATE_API = '/api/pool-state'

      function showMsg(text, type = 'success') {
        const el = document.getElementById('msg')
        el.className = 'msg ' + type
        el.textContent = text
        el.style.display = 'block'
        setTimeout(() => {
          el.style.display = 'none'
        }, 4000)
      }

      async function loadConfig() {
        const res = await fetch(API)
        if (!res.ok) throw new Error(await res.text())
        return res.json()
      }

      async function loadPoolState() {
        try {
          const res = await fetch(POOL_STATE_API)
          if (!res.ok) return []
          return res.json()
        } catch {
          return []
        }
      }

      function formatBlockedUntil(blockedUntil) {
        if (!blockedUntil) return ''
        try {
          const d = new Date(blockedUntil)
          return d.toLocaleString('zh-CN', { timeZoneName: 'short' })
        } catch {
          return String(blockedUntil)
        }
      }

      function findBlockedUntil(poolState, group, acc) {
        if (!Array.isArray(poolState)) return null
        const pid = acc.profile_id || acc.name
        const s = poolState.find(
          (x) =>
            x.proxy_host === group.proxy_host &&
            x.proxy_user === group.proxy_user &&
            x.account === acc.name &&
            (x.profile_id || x.account) === pid
        )
        return s?.blocked_until ?? null
      }

      function renderAccount(acc, accIndex, group, poolState, onRemove, onChange) {
        const blockedUntil = findBlockedUntil(poolState, group, acc)
        const unfreezeText = blockedUntil ? formatBlockedUntil(blockedUntil) : '—'
        const div = document.createElement('div')
        div.className = 'account'
        div.innerHTML = `
        <div class="fields">
          <div class="f"><label>name</label><input type="text" data-k="name" value="${escapeAttr(
            acc.name
          )}" placeholder="claude-01" /></div>
          <div class="f" style="flex: 1 1 260px; min-width: 220px;"><label>session_key</label><textarea data-k="session_key" placeholder="SESSION_KEY">${escapeAttr(
            acc.session_key
          )}</textarea></div>
          <div class="f"><label>profile_id（可选）</label><input type="text" data-k="profile_id" value="${escapeAttr(
            acc.profile_id || ''
          )}" placeholder="同 name 可留空" /></div>
          <div class="f"><label>解冻时间</label><span class="unfreeze" title="${escapeAttr(
            blockedUntil || ''
          )}">${escapeAttr(unfreezeText)}</span></div>
        </div>
        <div class="actions"><button type="button" class="btn btn-danger btn-sm">删除</button></div>
      `
        div.querySelector('[data-k="name"]').oninput = (e) =>
          onChange(accIndex, 'name', e.target.value)
        div.querySelector('[data-k="session_key"]').oninput = (e) =>
          onChange(accIndex, 'session_key', e.target.value)
        div.querySelector('[data-k="profile_id"]').oninput = (e) =>
          onChange(accIndex, 'profile_id', e.target.value || undefined)
        div.querySelector('.btn-danger').onclick = () => onRemove(accIndex)
        return div
      }

      function escapeAttr(s) {
        if (s == null) return ''
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
      }

      function renderGroup(
        group,
        groupIndex,
        config,
        poolState,
        onRemoveGroup,
        onAddAccount,
        onRemoveAccount,
        onAccountChange,
        onGroupChange,
        opts
      ) {
        const key = (k, def = '') => (group[k] != null && group[k] !== '' ? group[k] : def)
        const gkey = groupKey(group, groupIndex)
        const allAccounts = group.accounts || []
        const indices = opts.accountIndices || allAccounts.map((_, i) => i)
        const accounts = indices.map((i) => allAccounts[i])
        const totalCount = accounts.length
        if (totalCount > 30 && groupCollapsed[gkey] === undefined) groupCollapsed[gkey] = true
        const isCollapsed = groupCollapsed[gkey] === true
        const pageSize = groupPageSize[gkey] || DEFAULT_PAGE_SIZE
        const totalPages = Math.max(1, Math.ceil(totalCount / pageSize))
        const currentPage = Math.min(groupPage[gkey] || 0, totalPages - 1)
        const start = currentPage * pageSize
        const pageIndices = indices.slice(start, start + pageSize)
        const pageAccounts = pageIndices.map((i) => allAccounts[i])

        const div = document.createElement('div')
        div.className = 'group' + (isCollapsed ? ' collapsed' : '')
        div.dataset.groupIndex = String(groupIndex)
        div.innerHTML = `
        <h2 class="group-header ${isCollapsed ? 'collapsed' : ''}" data-action="toggle">
          <span>
            <span class="chevron">▼</span>
            <span class="label">代理组 ${groupIndex + 1}</span>
            <span class="label" style="margin-left:8px;font-weight:400">${
              group.proxy_host || '—'
            } · ${allAccounts.length} 个账号${
          opts.accountIndices ? `（筛选 ${totalCount}）` : ''
        }</span>
          </span>
          <span onclick="event.stopPropagation()">
            <button type="button" class="btn btn-ghost btn-sm" data-action="add-account">添加账号</button>
            <button type="button" class="btn btn-danger btn-sm" data-action="remove-group">删除本组</button>
          </span>
        </h2>
        <div class="group-body">
        <div class="row">
          <div><label>proxy_host</label><input type="text" data-k="proxy_host" value="${escapeAttr(
            key('proxy_host')
          )}" placeholder="sg.arxlabs.io:3010" /></div>
          <div style="grid-column: span 2;"><label>proxy_user</label><input type="text" data-k="proxy_user" value="${escapeAttr(
            key('proxy_user')
          )}" placeholder="代理用户名（较长）" /></div>
          <div><label>proxy_pass</label><input type="text" data-k="proxy_pass" value="${escapeAttr(
            key('proxy_pass')
          )}" placeholder="代理密码" /></div>
        </div>
        <div class="row">
          <div><label>fingerprint_id</label><input type="text" data-k="fingerprint_id" value="${escapeAttr(
            key('fingerprint_id')
          )}" placeholder="4567" /></div>
          <div><label>timezone</label><input type="text" data-k="timezone" value="${escapeAttr(
            key('timezone')
          )}" placeholder="America/Chicago" /></div>
        </div>
        <div class="accounts">
          <h3>账号列表</h3>
          <div class="accounts-list"></div>
          <div class="pagination">
            <span class="info">第 ${currentPage + 1} / ${totalPages} 页，共 ${totalCount} 条</span>
            <select data-action="page-size" title="每页条数">
              ${PAGE_SIZE_OPTIONS.map(
                (n) =>
                  `<option value="${n}" ${n === pageSize ? 'selected' : ''}>${n} 条/页</option>`
              ).join('')}
            </select>
            <button type="button" class="btn btn-ghost btn-sm" data-action="prev" ${
              currentPage <= 0 ? 'disabled' : ''
            }>上一页</button>
            <button type="button" class="btn btn-ghost btn-sm" data-action="next" ${
              currentPage >= totalPages - 1 ? 'disabled' : ''
            }>下一页</button>
          </div>
        </div>
        </div>
      `
        div.querySelector('[data-action="toggle"]').onclick = () => {
          groupCollapsed[gkey] = !groupCollapsed[gkey]
          opts.rerender()
        }
        ;['proxy_host', 'proxy_user', 'proxy_pass', 'fingerprint_id', 'timezone'].forEach((k) => {
          div.querySelector(`[data-k="${k}"]`).oninput = (e) =>
            onGroupChange(groupIndex, k, e.target.value)
        })
        div.querySelector('[data-action="add-account"]').onclick = () => onAddAccount(groupIndex)
        div.querySelector('[data-action="remove-group"]').onclick = () => onRemoveGroup(groupIndex)
        div.querySelector('[data-action="page-size"]').onchange = (e) => {
          groupPageSize[gkey] = Number(e.target.value)
          groupPage[gkey] = 0
          opts.rerender()
        }
        div.querySelector('[data-action="prev"]').onclick = () => {
          if (currentPage > 0) {
            groupPage[gkey] = currentPage - 1
            opts.rerender()
          }
        }
        div.querySelector('[data-action="next"]').onclick = () => {
          if (currentPage < totalPages - 1) {
            groupPage[gkey] = currentPage + 1
            opts.rerender()
          }
        }

        const list = div.querySelector('.accounts-list')
        pageAccounts.forEach((acc, localIndex) => {
          const globalIndex = pageIndices[localIndex]
          list.appendChild(
            renderAccount(
              acc,
              globalIndex,
              group,
              poolState,
              onRemoveAccount.bind(null, groupIndex),
              onAccountChange.bind(null, groupIndex)
            )
          )
        })
        return div
      }

      const PAGE_SIZE_OPTIONS = [10, 20, 50, 100, 200]
      const DEFAULT_PAGE_SIZE = 20

      let config = []
      let poolState = []
      let searchText = ''
      let groupCollapsed = {} // key -> boolean
      let groupPage = {} // key -> page index
      let groupPageSize = {} // key -> page size (default DEFAULT_PAGE_SIZE)

      function groupKey(group, index) {
        const h = (group.proxy_host || '').trim()
        const u = (group.proxy_user || '').trim()
        return h || u ? `${h}|${u}` : `idx-${index}`
      }

      function filterConfig(cfg, search) {
        const q = (search || '').trim().toLowerCase()
        if (!q) return cfg.map((g, i) => ({ group: g, groupIndex: i, accountIndices: null }))
        const result = []
        cfg.forEach((g, gi) => {
          const matchHost = (g.proxy_host || '').toLowerCase().includes(q)
          const matchUser = (g.proxy_user || '').toLowerCase().includes(q)
          const allAccounts = g.accounts || []
          const accountIndices = allAccounts
            .map((a, i) => i)
            .filter(
              (i) =>
                (allAccounts[i].name || '').toLowerCase().includes(q) ||
                (allAccounts[i].session_key || '').toLowerCase().includes(q)
            )
          const matchAccount = accountIndices.length > 0
          if (matchHost || matchUser || matchAccount) {
            result.push({
              group: g,
              groupIndex: gi,
              accountIndices: matchAccount ? accountIndices : null,
            })
          }
        })
        return result
      }

      function getConfigFromForm() {
        const list = document.getElementById('list')
        const groups = []
        list.querySelectorAll('.group').forEach((groupEl, gi) => {
          const g = {
            proxy_host: groupEl.querySelector('[data-k="proxy_host"]')?.value?.trim() || '',
            proxy_user: groupEl.querySelector('[data-k="proxy_user"]')?.value?.trim() || '',
            proxy_pass: groupEl.querySelector('[data-k="proxy_pass"]')?.value?.trim() || '',
            fingerprint_id: groupEl.querySelector('[data-k="fingerprint_id"]')?.value?.trim() || '',
            timezone: groupEl.querySelector('[data-k="timezone"]')?.value?.trim() || undefined,
            accounts: [],
          }
          groupEl.querySelectorAll('.account').forEach((accEl) => {
            const name = accEl.querySelector('[data-k="name"]')?.value?.trim()
            const session_key = accEl.querySelector('[data-k="session_key"]')?.value?.trim()
            const profile_id =
              accEl.querySelector('[data-k="profile_id"]')?.value?.trim() || undefined
            if (name && session_key)
              g.accounts.push({
                name,
                session_key,
                profile_id: profile_id || undefined,
              })
          })
          if (g.accounts.length) groups.push(g)
        })
        return groups
      }

      function render(configData, stateData = []) {
        config = JSON.parse(JSON.stringify(configData))
        poolState = Array.isArray(stateData) ? stateData : []
        searchText =
          (document.getElementById('search') && document.getElementById('search').value) || ''
        const filtered = filterConfig(config, searchText)
        const list = document.getElementById('list')
        list.innerHTML = ''

        const totalGroups = config.length
        const totalAccounts = config.reduce((n, g) => n + (g.accounts || []).length, 0)
        const statsEl = document.getElementById('stats')
        if (statsEl) {
          if (searchText.trim()) {
            statsEl.textContent = `共 ${totalGroups} 个代理组、${totalAccounts} 个账号（当前筛选显示 ${filtered.length} 组）`
          } else {
            statsEl.textContent = `共 ${totalGroups} 个代理组、${totalAccounts} 个账号`
          }
        }

        function rerender() {
          render(config, poolState)
        }
        function onGroupChange(gi, k, v) {
          if (!config[gi]) return
          config[gi][k] = v
        }
        function onAddAccount(gi) {
          if (!config[gi]) config[gi].accounts = config[gi].accounts || []
          config[gi].accounts.push({ name: '', session_key: '' })
          rerender()
        }
        function onRemoveAccount(gi, ai) {
          config[gi].accounts.splice(ai, 1)
          rerender()
        }
        function onAccountChange(gi, ai, k, v) {
          if (config[gi].accounts[ai]) config[gi].accounts[ai][k] = v
        }
        function onRemoveGroup(gi) {
          config.splice(gi, 1)
          rerender()
        }

        filtered.forEach(({ group, groupIndex, accountIndices }) => {
          list.appendChild(
            renderGroup(
              group,
              groupIndex,
              config,
              poolState,
              onRemoveGroup,
              onAddAccount,
              onRemoveAccount,
              onAccountChange,
              onGroupChange,
              { rerender, accountIndices }
            )
          )
        })
      }

      function addGroup() {
        config.push({
          proxy_host: '',
          proxy_user: '',
          proxy_pass: '',
          fingerprint_id: '',
          timezone: 'America/Chicago',
          accounts: [{ name: '', session_key: '' }],
        })
        render(config, poolState)
      }

      document.getElementById('load').onclick = async () => {
        try {
          const [data, state] = await Promise.all([loadConfig(), loadPoolState()])
          render(data, state)
          showMsg('已加载')
        } catch (e) {
          showMsg('加载失败: ' + e.message, 'error')
        }
      }

      document.getElementById('save').onclick = async () => {
        const toSave = config
          .map((g) => ({
            ...g,
            accounts: (g.accounts || []).filter(
              (a) => (a.name || '').trim() && (a.session_key || '').trim()
            ),
          }))
          .filter((g) => g.accounts.length > 0)
        if (!toSave.length) {
          showMsg('请至少保留一个代理组且每组至少一个账号', 'error')
          return
        }
        try {
          const res = await fetch(API, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(toSave),
          })
          const text = await res.text()
          if (!res.ok) throw new Error(text || res.statusText)
          showMsg('保存成功并已生效')
          const [cfg, state] = await Promise.all([loadConfig(), loadPoolState()])
          render(cfg, state)
        } catch (e) {
          showMsg('保存失败: ' + e.message, 'error')
        }
      }

      document.getElementById('addGroup').onclick = addGroup

      let searchDebounce
      document.getElementById('search').oninput = () => {
        clearTimeout(searchDebounce)
        searchDebounce = setTimeout(() => render(config, poolState), 200)
      }
      ;(async () => {
        try {
          const [data, state] = await Promise.all([loadConfig(), loadPoolState()])
          render(data, state)
        } catch (e) {
          render([], [])
          showMsg('未加载到配置，可新建后保存', 'error')
        }
      })()
    </script>
  </body>
</html>
